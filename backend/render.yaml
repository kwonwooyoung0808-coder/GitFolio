services:
  - type: web
    name: gitfolio-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: USE_CLOUD_LLM
        value: "true"
      - key: OLLAMA_ENABLED
        value: "false"
      - key: ENABLE_PDF
        value: "false"
      - key: ENV
        value: "production"
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
